# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  🤖 GitHub Actions Workflow - ربات مانیتور گروه تلگرام
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  این ورک‌فلو ربات تلگرام رو اجرا می‌کنه:
#  - هر ۶ ساعت یکبار اجرا میشه
#  - با دستور manual هم قابل اجراست
#  - دیتابیس بین اجراها حفظ میشه (Artifact)
#
#  🔐 تنظیمات مورد نیاز (Settings > Secrets):
#  - BOT_TOKEN: توکن ربات تلگرام
#  - ADMIN_IDS: آیدی ادمین‌ها (اختیاری)
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: 🤖 Telegram Bot Runner

on:
  # ─── اجرای دستی ───
  workflow_dispatch:
    inputs:
      log_level:
        description: "📝 سطح لاگ"
        required: false
        default: "INFO"
        type: choice
        options:
          - INFO
          - DEBUG
          - WARNING
          - ERROR

  # ─── اجرای زمان‌بندی شده (هر ۶ ساعت) ───
  schedule:
    - cron: "0 */6 * * *"

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
  DATABASE_PATH: data/bot.db
  LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
  PYTHON_VERSION: "3.12"

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  مرحله ۱: بررسی کیفیت کد
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    name: 🔍 بررسی کد
    runs-on: ubuntu-latest

    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🐍 تنظیم پایتون
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 نصب وابستگی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
          pip install flake8 black

      - name: 🔍 بررسی Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: 🎨 بررسی فرمت Black
        run: |
          black --check --diff --line-length=120 .

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  مرحله ۲: ساخت داکر
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: 🏗️ ساخت داکر
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🔧 تنظیم Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📋 متادیتا ایمیج
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: telegram-group-monitor
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: 🏗️ ساخت ایمیج
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ تست ایمیج
        run: |
          docker run --rm telegram-group-monitor:latest python -c "import config; print('✅ Import OK')"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  مرحله ۳: اجرای ربات
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  run-bot:
    name: 🚀 اجرای ربات
    runs-on: ubuntu-latest
    needs: [lint, build]
    timeout-minutes: 350  # ~5.8 ساعت ( GitHub Actions حداکثر 6 ساعت )

    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      # ─── بازیابی دیتابیس قبلی ───
      - name: 🗄️ بازیابی دیتابیس
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bot-database
          path: data/

      - name: 🐍 تنظیم پایتون
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 نصب وابستگی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── ساخت پوشه دیتابیس ───
      - name: 📁 آماده‌سازی محیط
        run: mkdir -p data

      # ─── اجرای ربات ───
      - name: 🤖 اجرای ربات تلگرام
        run: |
          echo "🚀 شروع اجرای ربات..."
          echo "📅 $(date '+%Y-%m-%d %H:%M:%S')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python main.py
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ اجرای ربات پایان یافت"

      # ─── ذخیره دیتابیس ───
      - name: 💾 ذخیره دیتابیس
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-database
          path: data/
          retention-days: 90

      # ─── لاگ اجرا ───
      - name: 📋 جمع‌آوری لاگ‌ها
        if: always()
        run: |
          echo "📊 اطلاعات اجرا:"
          echo "  📅 تاریخ: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "  🐍 پایتون: $(python --version)"
          echo "  📦 پکیج‌ها:"
          pip list --format=columns | head -20
          echo ""
          echo "  🗄️ حجم دیتابیس:"
          du -sh data/ 2>/dev/null || echo "  دیتابیسی یافت نشد"
