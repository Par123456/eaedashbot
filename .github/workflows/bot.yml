name: 🤖 Run Telegram Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # هر 5 ساعت یکبار اجرا میشه (GitHub Actions حداکثر 6 ساعت کار میکنه)
    - cron: '0 */5 * * *'

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # حدود 5 ساعت و 50 دقیقه

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 💾 Restore database cache
        uses: actions/cache@v4
        with:
          path: data/bot.db
          key: bot-db-${{ github.run_id }}
          restore-keys: |
            bot-db-

      - name: 🚀 Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_PATH: data/bot.db
        run: |
          python -m bot.main

      - name: 💾 Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-database-${{ github.run_id }}
          path: data/bot.db
          retention-days: 7
